<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>처치 유형별 분석 · EICU QI Monitor</title>
<script>
document.querySelector('[data-theme-toggle]').addEventListener('click', () => {
  const h = document.documentElement;
  const next = h.dataset.theme === 'dark' ? 'light' : 'dark';
  h.dataset.theme = next;
  localStorage.setItem('eicu_theme', next);
  rebuildAll();
});

const gc = () => document.documentElement.dataset.theme === 'dark' ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const tc = () => document.documentElement.dataset.theme === 'dark' ? '#8892a4' : '#64748b';

const DAYS = ['월','화','수','목','금','토','일'];

// ─── localStorage 실데이터 읽기 ────────────────────────────
function readAllUploads() {
  const results = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('upload_')) continue;
    try {
      const val = JSON.parse(localStorage.getItem(key));
      if (val) results.push({ key, ...val });
    } catch(e) {}
  }
  return results;
}

function getTypeFromItem(item) {
  if (!item) return '기타';
  const s = item.toLowerCase();
  if (/산소|o2|hfnc/.test(s)) return '산소';
  if (/인공호흡기|vent/.test(s)) return '인공호흡기';
  if (/crrt/.test(s)) return 'CRRT';
  if (/지속|infus|pump|pca/.test(s)) return '지속정주';
  if (/드레싱|dress|wound/.test(s)) return '드레싱';
  if (/수혈|transfus|rbc|ffp/.test(s)) return '수혈';
  return '기타';
}

function buildRealData() {
  const uploads = readAllUploads();

  // 처치 유형별 건수
  const typeCounts = {};
  let totalRows = 0;
  uploads.forEach(u => {
    const rows = u.rows || u.items || [];
    rows.forEach(row => {
      totalRows++;
      const name = row.item || row['항목'] || row['처치명'] || row['품명'] || '';
      const t = getTypeFromItem(name);
      typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
  });

  const types = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
  const values = types.map(t => typeCounts[t]);
  const COLORS = ['#f03e3e','#e67700','#4dabf7','#206bc4','#74c0fc','#40c057','#868e96'];

  // 월별 업로드 건수
  const dateCounts = {};
  uploads.forEach(u => {
    const key = u.key || '';
    const match = key.match(/upload_(\d{4}-\d{2})/);
    const month = match ? match[1] : (u.date || '').slice(0, 7);
    if (month) dateCounts[month] = (dateCounts[month] || 0) + 1;
  });
  const recentDates = Object.keys(dateCounts).sort().slice(-6);

  // 교대별 히트맵 (upload_YYYY-MM-DD_X 패턴)
  const heatmap = { D:[0,0,0,0,0,0,0], E:[0,0,0,0,0,0,0], N:[0,0,0,0,0,0,0] };
  uploads.forEach(u => {
    const m = (u.key || '').match(/upload_(\d{4}-\d{2}-\d{2})_([DEN])/);
    if (m) {
      const dow = new Date(m[1]).getDay();
      const dayIdx = dow === 0 ? 6 : dow - 1;
      if (heatmap[m[2]]) heatmap[m[2]][dayIdx]++;
    }
  });

  // 품목별 Top5
  const itemCounts = {};
  uploads.forEach(u => {
    const rows = u.rows || u.items || [];
    rows.forEach(row => {
      const name = row.item || row['항목'] || row['처치명'] || row['품명'] || '기타';
      itemCounts[name] = (itemCounts[name] || 0) + 1;
    });
  });

  return { types, values, colors: COLORS, typeCounts, dateCounts, recentDates, heatmap, totalRows, uploads, itemCounts };
}

let mismatchChart = null, delayChart = null;
let currentPeriod = 'monthly';

function switchAnalysisPeriod(period) {
  currentPeriod = period;
  document.getElementById('tab-monthly-analysis').classList.toggle('active', period === 'monthly');
  document.getElementById('tab-weekly-analysis').classList.toggle('active', period === 'weekly');
  rebuildAll();
}

function buildMismatchChart(d) {
  const ctx = document.getElementById('chart-mismatch-trend').getContext('2d');
  const labels = d && d.recentDates.length ? d.recentDates : ['데이터 없음'];
  const data   = labels.map(k => d ? (d.dateCounts[k] || 0) : 0);
  document.getElementById('mismatch-sub').textContent = '월별 업로드 건수';
  mismatchChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label:'업로드 건수', data, backgroundColor:'rgba(32,107,196,0.75)', borderRadius:5 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:tc(), boxWidth:12, font:{size:11} } } },
      scales:{
        x:{ grid:{color:gc()}, ticks:{color:tc()} },
        y:{ beginAtZero:true, grid:{color:gc()}, ticks:{color:tc(), stepSize:1} }
      }
    }
  });
}

function buildDelayChart(d) {
  const ctx = document.getElementById('chart-delay-by-type').getContext('2d');
  const labels = d && d.types.length ? d.types : ['데이터 없음'];
  const values = d && d.values.length ? d.values : [0];
  const colors = d ? d.colors.slice(0, labels.length) : ['#e9ecef'];
  delayChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label:'항목 수', data:values, backgroundColor:colors, borderRadius:5, borderSkipped:false }] },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ beginAtZero:true, grid:{color:gc()}, ticks:{color:tc()} },
        y:{ grid:{display:false}, ticks:{color:tc()} }
      }
    }
  });
}

function buildDetailTable(d) {
  const tbody = document.getElementById('analysis-tbody');
  if (!d || !d.types.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1.5rem">업로드된 데이터가 없습니다. 메인화면에서 파일을 업로드해주세요.</td></tr>';
    return;
  }
  tbody.innerHTML = d.types.map((t, i) => {
    const count = d.values[i];
    const pct = d.totalRows > 0 ? Math.round(count / d.totalRows * 100) : 0;
    const tag = pct >= 30 ? '<span class="tag tag-r">다수</span>' : pct >= 15 ? '<span class="tag tag-y">보통</span>' : '<span class="tag tag-g">소수</span>';
    return `<tr>
      <td>${t}</td>
      <td style="font-family:var(--fm)">${count}</td>
      <td style="font-family:var(--fm)">${d.totalRows}</td>
      <td style="font-family:var(--fm)">${pct}%</td>
      <td>${tag}</td>
    </tr>`;
  }).join('');
}

function buildTop5Table(d) {
  const tbody = document.getElementById('top5-tbody');
  if (!d || !Object.keys(d.itemCounts).length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:1.5rem">업로드된 데이터가 없습니다</td></tr>';
    return;
  }
  const top5 = Object.entries(d.itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  tbody.innerHTML = top5.map(([name, count], i) => `<tr>
    <td style="font-family:var(--fm);font-weight:700">${i+1}</td>
    <td>${name}</td>
    <td style="font-family:var(--fm)">${count}</td>
    <td style="font-family:var(--fm)">—</td>
    <td style="font-family:var(--fm)">—</td>
    <td><span class="tag tag-b">집계</span></td>
  </tr>`).join('');
}

function getHeatColor(val, max) {
  const ratio = val / Math.max(max, 1);
  const r = Math.round(231 - ratio * (231 - 24));
  const g = Math.round(245 - ratio * (245 - 100));
  const b = Math.round(255 - ratio * (255 - 171));
  return `rgb(${r},${g},${b})`;
}

function buildHeatmap(d) {
  const table = document.getElementById('heatmap-table');
  const heatmap = d ? d.heatmap : { D:[0,0,0,0,0,0,0], E:[0,0,0,0,0,0,0], N:[0,0,0,0,0,0,0] };
  const shifts = ['D','E','N'];
  const allVals = shifts.flatMap(s => heatmap[s]);
  const maxVal = Math.max(...allVals, 1);

  let html = '<thead><tr><th></th>' + DAYS.map(day => `<th>${day}</th>`).join('') + '</tr></thead><tbody>';
  shifts.forEach(s => {
    html += `<tr><td class="row-lbl">${s}교대</td>`;
    DAYS.forEach((_, di) => {
      const v = heatmap[s][di];
      const bg = v > 0 ? getHeatColor(v, maxVal) : '#f1f3f5';
      const textColor = v > 0 && v / maxVal > 0.5 ? '#fff' : '#1864ab';
      html += `<td style="background:${bg};color:${v > 0 ? textColor : '#adb5bd'}" title="${s}교대 ${DAYS[di]}: ${v}건">${v || '—'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function rebuildAll() {
  const d = buildRealData();
  if (mismatchChart) { mismatchChart.destroy(); mismatchChart = null; }
  if (delayChart) { delayChart.destroy(); delayChart = null; }
  buildMismatchChart(d);
  buildDelayChart(d);
  buildDetailTable(d);
  buildTop5Table(d);
  buildHeatmap(d);
}

document.addEventListener('DOMContentLoaded', () => { rebuildAll(); });
</script>
</body>
</html>
